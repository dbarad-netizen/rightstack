<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RightStack — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070d; --panel:#101220; --panel2:#0d0e1a; --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
    --ink:#f4f5fb; --muted:#8b90a6; --dim:#5d6178; --indigo:#6c6cf5; --indigo2:#8f7bff;
    --green:#35d6a4; --greenSoft:rgba(53,214,164,.12); --amber:#f5b042; --amberSoft:rgba(245,158,11,.12);
    --red:#ef5a5a; --redSoft:rgba(239,90,90,.12);
    --grot:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"Space Mono",ui-monospace,Menlo,monospace; --radius:16px;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:var(--grot);color:var(--ink);background:
    radial-gradient(900px 480px at 80% -10%,rgba(108,108,245,.16),transparent 60%),var(--bg);min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 22px 70px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
  .gem{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--indigo),var(--indigo2));display:flex;align-items:center;justify-content:center}
  .gem:after{content:"";width:13px;height:13px;border:2.4px solid #fff;transform:rotate(45deg);border-radius:3px}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
  header.bar{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  header .right{margin-left:auto;display:flex;gap:10px;align-items:center}
  .btn{appearance:none;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--grot);padding:10px 16px}
  .btn.primary{background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#fff}
  .btn.ghost{background:transparent;color:var(--muted)} .btn.ghost:hover{color:var(--ink)}
  .btn.line{background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--ink)}
  /* gate */
  #gate{max-width:380px;margin:12vh auto 0;text-align:center}
  #gate .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:34px}
  #gate h1{font-size:24px;margin:14px 0 6px} #gate p{color:var(--muted);font-size:14px;margin:0 0 18px}
  input.fld{width:100%;background:var(--panel2);border:1px solid var(--line2);color:#fff;border-radius:11px;padding:13px 14px;font-size:15px;font-family:var(--grot)}
  #gateMsg{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
  /* dashboard */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .stat{border:1px solid var(--line);border-radius:13px;padding:16px 18px;background:var(--panel2)}
  .stat .n{font-family:var(--mono);font-size:26px;font-weight:700}
  .stat .l{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-top:4px}
  .stat.review .n{color:var(--amber)} .stat.pub .n{color:var(--green)} .stat.arch .n{color:var(--muted)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .tabs{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px}
  .tab{padding:8px 14px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:var(--grot);font-weight:600}
  .tab.on{background:rgba(108,108,245,.18);color:#cdc9ff}
  .search{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line2);color:#fff;border-radius:10px;padding:10px 13px;font-family:var(--grot);font-size:14px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  th{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;text-align:left;padding:12px 14px;background:var(--panel2);border-bottom:1px solid var(--line)}
  td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .tname{font-weight:700} .tcat{font-family:var(--mono);font-size:10.5px;color:var(--dim);text-transform:uppercase;margin-top:2px}
  .src{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .pill{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;border-radius:7px;padding:4px 9px}
  .pill.review{background:var(--amberSoft);color:var(--amber)} .pill.published{background:var(--greenSoft);color:var(--green)}
  .pill.archived{background:rgba(255,255,255,.07);color:var(--muted)} .pill.new{background:var(--amberSoft);color:var(--amber);margin-left:6px}
  .acts{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
  .mini{font-size:12px;padding:7px 11px;border-radius:8px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--ink);cursor:pointer;font-family:var(--grot);font-weight:600}
  .mini.pub{border-color:var(--greenSoft);color:var(--green)} .mini.pub:hover{background:var(--greenSoft)}
  .mini.arch:hover{background:rgba(255,255,255,.1)}
  .mini.del{border-color:var(--redSoft);color:var(--red)} .mini.del:hover{background:var(--redSoft)}
  .mini:hover{background:rgba(255,255,255,.1)}
  .empty{text-align:center;color:var(--muted);padding:40px;border:1px dashed var(--line2);border-radius:13px}
  .hide{display:none}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#12131f;border:1px solid var(--line2);color:#fff;padding:12px 18px;border-radius:11px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:1}
  a.link{color:var(--indigo2);text-decoration:none;font-size:12px}
  /* analytics */
  .stats.ana4{grid-template-columns:repeat(4,1fr)}
  .anabar{display:flex;align-items:center;gap:12px;margin:2px 0 16px}
  .anatitle{font-weight:700;font-size:15px}
  .anaranges{margin-left:auto;display:flex;gap:6px}
  .anagrid{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:760px){.anagrid{grid-template-columns:1fr}.stats.ana4{grid-template-columns:repeat(2,1fr)}}
  .anacard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .anah{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .barname{flex:0 0 42%;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bartrack{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
  .barfill{height:100%;background:linear-gradient(90deg,var(--indigo),var(--indigo2));border-radius:6px}
  .barval{flex:0 0 auto;font-family:var(--mono);font-size:13px;color:var(--ink);min-width:26px;text-align:right}
  .anafoot{color:var(--dim);font-size:12px;margin-top:16px;line-height:1.5}
  /* add-tool modal */
  .modalbg{position:fixed;inset:0;background:rgba(3,3,8,.66);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
  .modalbg.hide{display:none}
  .modal{width:100%;max-width:660px;background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:26px 26px 22px}
  .modal h2{margin:0 0 4px;font-size:21px}
  .modal .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  @media(max-width:560px){.frow{grid-template-columns:1fr}}
  .ffull{grid-column:1/-1}
  .flabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:5px}
  .modal input[type=text],.modal textarea,.modal select{width:100%;background:var(--panel2);border:1px solid var(--line2);color:#fff;border-radius:10px;padding:10px 12px;font-family:var(--grot);font-size:14px}
  .modal textarea{resize:vertical;min-height:58px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;user-select:none}
  .chip.on{background:rgba(108,108,245,.18);border-color:rgba(108,108,245,.5);color:#cdc9ff}
  .checkline{display:flex;align-items:center;gap:8px;color:var(--ink);font-size:14px}
  .modalfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  #addMsg{color:var(--red);font-size:13px;min-height:18px;margin-top:8px}
  /* bulk-select */
  th.cb,td.cb{width:38px;text-align:center;padding-left:14px;padding-right:0}
  input.bcb{appearance:none;width:17px;height:17px;border:1.5px solid var(--line2);border-radius:5px;background:var(--panel2);cursor:pointer;position:relative;vertical-align:middle;margin:0}
  input.bcb:checked{background:var(--indigo);border-color:var(--indigo)}
  input.bcb:checked:after{content:"";position:absolute;left:4px;top:0px;width:5px;height:10px;border:solid #fff;border-width:0 2.4px 2.4px 0;transform:rotate(45deg)}
  input.bcb:indeterminate{background:var(--indigo);border-color:var(--indigo)}
  input.bcb:indeterminate:after{content:"";position:absolute;left:3px;top:6.5px;width:9px;height:2.4px;background:#fff}
  tr.selrow td{background:rgba(108,108,245,.07)}
  #bulkbar{position:fixed;bottom:0;left:0;right:0;background:#0c0d18;border-top:1px solid var(--line2);padding:12px 22px;display:none;align-items:center;gap:12px;z-index:40;box-shadow:0 -12px 28px rgba(0,0,0,.4)}
  #bulkbar.show{display:flex}
  #bulkbar .bcount{font-weight:700;font-size:14px}
  #bulkbar .bcount .n{font-family:var(--mono);color:var(--indigo2);margin-right:4px}
  #bulkbar .bactions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  #bulkbar .mini{padding:8px 13px}
</style>
</head>
<body>
<div class="wrap">

  <!-- GATE -->
  <div id="gate">
    <div class="card">
      <div class="brand" style="justify-content:center"><span class="gem"></span><span>RightStack</span></div>
      <h1>Admin access</h1>
      <p>Enter your admin password to manage the catalog.</p>
      <input class="fld" id="pw" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')unlock()" />
      <div id="gateMsg"></div>
      <button class="btn primary" style="width:100%;margin-top:14px" onclick="unlock()">Unlock</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hide">
    <header class="bar">
      <span class="gem"></span>
      <div><div class="brand" style="gap:0">RightStack Admin</div><div class="tag">Catalog review queue</div></div>
      <div class="right">
        <button class="btn primary" onclick="openAddForm()">+ Add tool</button>
        <button class="btn line" onclick="load()">↻ Refresh</button>
        <button class="btn ghost" onclick="lock()">Lock</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat review"><div class="n" id="cReview">0</div><div class="l">In review</div></div>
      <div class="stat pub"><div class="n" id="cPub">0</div><div class="l">Published (live)</div></div>
      <div class="stat arch"><div class="n" id="cArch">0</div><div class="l">Archived</div></div>
    </div>

    <div class="toolbar">
      <div class="tabs">
        <button class="tab on" data-t="review" onclick="setTab('review')">Review</button>
        <button class="tab" data-t="published" onclick="setTab('published')">Published</button>
        <button class="tab" data-t="archived" onclick="setTab('archived')">Archived</button>
        <button class="tab" data-t="all" onclick="setTab('all')">All</button>
        <button class="tab" data-t="analytics" onclick="setTab('analytics')">Analytics</button>
      </div>
      <input class="search" id="search" placeholder="Search tools..." oninput="render()" />
    </div>

    <div id="list"></div>
  </div>
</div>

<!-- ADD TOOL MODAL -->
<div id="addModal" class="modalbg hide" onclick="if(event.target===this)closeAddForm()">
  <div class="modal">
    <h2>Add a tool</h2>
    <p class="sub">New tools land in your <b>Review</b> queue by default — publish them when you're ready.</p>

    <div class="frow">
      <div><label class="flabel">ID / slug *</label><input type="text" id="f_id" placeholder="e.g. jasper (lowercase, no spaces)" /></div>
      <div><label class="flabel">Name *</label><input type="text" id="f_name" placeholder="e.g. Jasper" /></div>
    </div>
    <div class="frow">
      <div><label class="flabel">Category</label><input type="text" id="f_category" placeholder="e.g. Marketing copywriter" /></div>
      <div><label class="flabel">Starting price</label><input type="text" id="f_price" placeholder="e.g. $39/mo or Free" /></div>
    </div>
    <div class="ffull" style="margin-bottom:12px">
      <label class="flabel">Description</label>
      <textarea id="f_desc" placeholder="One sentence on what it does and who it's for."></textarea>
    </div>
    <div class="ffull" style="margin-bottom:12px">
      <label class="flabel">Use-cases (tags) — pick all that apply *</label>
      <div class="chips" id="f_tags"></div>
    </div>
    <div class="ffull" style="margin-bottom:12px">
      <label class="flabel">Company sizes it fits</label>
      <div class="chips" id="f_sizes"></div>
    </div>
    <div class="frow">
      <div><label class="flabel">Price tier</label>
        <select id="f_tier"><option value="">—</option><option value="free">Free</option><option value="low">Low ($)</option><option value="mid">Mid ($$)</option><option value="high">High ($$$)</option></select></div>
      <div><label class="flabel">Setup ease</label>
        <select id="f_ease"><option value="">—</option><option value="1">Easy</option><option value="2">Moderate</option><option value="3">Advanced</option></select></div>
    </div>
    <div class="frow">
      <div><label class="flabel">Affiliate program</label><input type="text" id="f_affiliate" placeholder="e.g. PartnerStack, Impact, or None" /></div>
      <div><label class="flabel">Commission</label><input type="text" id="f_commission" placeholder="e.g. 25–30% recurring" /></div>
    </div>
    <div class="frow">
      <div><label class="flabel">Affiliate / “Try” link (url)</label><input type="text" id="f_url" placeholder="https://your-affiliate-link" /></div>
      <div><label class="flabel">Homepage (site)</label><input type="text" id="f_site" placeholder="https://tool.com" /></div>
    </div>
    <div class="frow">
      <div><label class="flabel">Status</label>
        <select id="f_status"><option value="review">Review (default)</option><option value="published">Published (live now)</option></select></div>
      <div class="checkline" style="align-self:end;padding-bottom:10px">
        <input type="checkbox" id="f_free" /> <label for="f_free">Has a free plan</label></div>
    </div>

    <div id="addMsg"></div>
    <div class="modalfoot">
      <button class="btn ghost" onclick="closeAddForm()">Cancel</button>
      <button class="btn primary" onclick="submitAddTool()">Add tool</button>
    </div>
  </div>
</div>

<!-- BULK ACTION BAR -->
<div id="bulkbar">
  <div class="bcount"><span class="n" id="bSelN">0</span> selected</div>
  <button class="mini" onclick="clearSel()">Clear</button>
  <div class="bactions">
    <button class="mini pub" onclick="bulkAct('published')">Publish</button>
    <button class="mini" onclick="bulkAct('review')">To review</button>
    <button class="mini arch" onclick="bulkAct('archived')">Archive</button>
    <button class="mini del" onclick="bulkDel()">Delete</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== config ===== */
const FN_URL = "https://xazmwpozsmbrqoulizyn.supabase.co/functions/v1/admin";
const ANON_KEY = "sb_publishable_nxpCXX6gQ8ZOWjFGdgFi3A_hcfOxoSY";

let PW = sessionStorage.getItem("rs_admin_pw") || "";
let TOOLS = [];
let TAB = "review";
let RANGE = 30;
let ANALYTICS = null;
let SELECTED = new Set();
let VISIBLE_IDS = [];

async function api(action, extra){
  const res = await fetch(FN_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":ANON_KEY },
    body: JSON.stringify(Object.assign({ action, password:PW }, extra||{}))
  });
  let j = {}; try { j = await res.json(); } catch(e){}
  if(!res.ok) throw new Error(j.error || ("HTTP "+res.status));
  return j;
}

async function unlock(){
  PW = document.getElementById("pw").value.trim();
  const msg = document.getElementById("gateMsg"); msg.textContent="";
  if(!PW){ msg.textContent="Enter your password."; return; }
  try{
    await load();
    sessionStorage.setItem("rs_admin_pw", PW);
    document.getElementById("gate").classList.add("hide");
    document.getElementById("dash").classList.remove("hide");
  }catch(e){ msg.textContent = /unauth/i.test(e.message) ? "Wrong password." : ("Error: "+e.message); }
}
function lock(){ sessionStorage.removeItem("rs_admin_pw"); PW=""; location.reload(); }

async function load(){
  const j = await api("list");
  TOOLS = j.tools || [];
  const by = s => TOOLS.filter(t=>t.status===s).length;
  document.getElementById("cReview").textContent = by("review");
  document.getElementById("cPub").textContent = by("published");
  document.getElementById("cArch").textContent = by("archived");
  render();
}

function setTab(t){
  TAB=t;
  SELECTED.clear();
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on", b.dataset.t===t));
  document.getElementById("search").style.display = (t==="analytics") ? "none" : "";
  render();
}
function setRange(n){ RANGE=n; renderAnalytics(); }

function fmtDate(s){ if(!s) return ""; const d=new Date(s); return isNaN(d)?"":d.toLocaleDateString(); }

function render(){
  if(TAB==="analytics"){ VISIBLE_IDS=[]; updateBulkBar(); renderAnalytics(); return; }
  const q = (document.getElementById("search").value||"").toLowerCase();
  let rows = TOOLS.filter(t => TAB==="all" ? true : t.status===TAB);
  if(q) rows = rows.filter(t => ((t.name||"")+" "+(t.category||"")+" "+(t.description||"")).toLowerCase().includes(q));

  VISIBLE_IDS = rows.map(t=>t.id);
  // prune SELECTED to only currently-visible rows
  SELECTED = new Set([...SELECTED].filter(id => VISIBLE_IDS.includes(id)));

  const host = document.getElementById("list");
  if(!rows.length){ host.innerHTML = `<div class="empty">Nothing here${TAB==="review"?" — your review queue is clear. New tools land here every week.":"."}</div>`; updateBulkBar(); return; }

  host.innerHTML = `<table><thead><tr>
      <th class="cb"><input type="checkbox" class="bcb" id="headCb" onclick="toggleAllVisible(this.checked)" /></th>
      <th>Tool</th><th>Status</th><th>Source</th><th>Added</th><th style="text-align:right">Actions</th>
    </tr></thead><tbody>` + rows.map(rowHtml).join("") + `</tbody></table>`;
  updateBulkBar();
}

function rowHtml(t){
  const isNew = t.is_new ? '<span class="pill new">New</span>' : '';
  const sel = SELECTED.has(t.id);
  const acts = [];
  if(t.status !== "published") acts.push(`<button class="mini pub" onclick="act('${t.id}','published')">Publish</button>`);
  if(t.status !== "review")    acts.push(`<button class="mini" onclick="act('${t.id}','review')">To review</button>`);
  if(t.status !== "archived")  acts.push(`<button class="mini arch" onclick="act('${t.id}','archived')">Archive</button>`);
  acts.push(`<button class="mini del" onclick="del('${t.id}','${(t.name||'').replace(/'/g,"")}')">Delete</button>`);
  return `<tr class="${sel?'selrow':''}">
    <td class="cb"><input type="checkbox" class="bcb" ${sel?'checked':''} onclick="toggleSel('${t.id}',this.checked)" /></td>
    <td><div class="tname">${esc(t.name)} ${isNew}</div><div class="tcat">${esc(t.category||"")}</div>
        ${t.url?`<a class="link" href="${esc(t.url)}" target="_blank" rel="noopener">visit ↗</a>`:""}</td>
    <td><span class="pill ${t.status}">${t.status}</span></td>
    <td><span class="src">${esc(t.source||"")}</span></td>
    <td><span class="src">${fmtDate(t.added_at)}</span></td>
    <td><div class="acts">${acts.join("")}</div></td>
  </tr>`;
}

/* ===== bulk selection ===== */
function toggleSel(id, on){
  if(on) SELECTED.add(id); else SELECTED.delete(id);
  // toggle row tint without full re-render
  const cb = document.querySelector(`input.bcb[onclick*="'${id}'"]`);
  if(cb) cb.closest("tr").classList.toggle("selrow", on);
  updateBulkBar();
}
function toggleAllVisible(on){
  if(on) VISIBLE_IDS.forEach(id => SELECTED.add(id));
  else   VISIBLE_IDS.forEach(id => SELECTED.delete(id));
  render();
}
function clearSel(){ SELECTED.clear(); render(); }
function updateBulkBar(){
  const n = SELECTED.size;
  const bar = document.getElementById("bulkbar");
  bar.classList.toggle("show", n>0);
  document.getElementById("bSelN").textContent = n;
  // sync header checkbox state
  const head = document.getElementById("headCb");
  if(head){
    const allSel = VISIBLE_IDS.length>0 && VISIBLE_IDS.every(id=>SELECTED.has(id));
    head.checked = allSel;
    head.indeterminate = !allSel && VISIBLE_IDS.some(id=>SELECTED.has(id));
  }
}
async function bulkAct(status){
  if(!SELECTED.size) return;
  const ids = [...SELECTED];
  try{
    const j = await api("bulk_set_status", { ids, status });
    toast(`Moved ${j.updated||ids.length} to ${status}`);
    SELECTED.clear();
    await load();
  }catch(e){ toast("Error: "+e.message); }
}
async function bulkDel(){
  if(!SELECTED.size) return;
  const ids = [...SELECTED];
  if(!confirm(`Delete ${ids.length} tools permanently? This cannot be undone.`)) return;
  try{
    const j = await api("bulk_delete", { ids });
    toast(`Deleted ${j.deleted||ids.length}`);
    SELECTED.clear();
    await load();
  }catch(e){ toast("Error: "+e.message); }
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ===== analytics ===== */
async function renderAnalytics(){
  const host = document.getElementById("list");
  const rangeBtns = [7,30,90].map(n => `<button class="mini ${RANGE===n?'pub':''}" onclick="setRange(${n})">${n}d</button>`).join("");
  host.innerHTML = `
    <div class="anabar">
      <div class="anatitle">Performance — last ${RANGE} days</div>
      <div class="anaranges">${rangeBtns}</div>
    </div>
    <div id="anaBody"><div class="empty">Loading analytics…</div></div>`;
  try{
    const j = await api("analytics", { days: RANGE });
    ANALYTICS = j.analytics || {};
    drawAnalytics();
  }catch(e){
    document.getElementById("anaBody").innerHTML = `<div class="empty">Couldn't load analytics — ${esc(e.message)}</div>`;
  }
}

function drawAnalytics(){
  const a = ANALYTICS || {}, tot = a.totals || {};
  const clicks = tot.click||0, completes = tot.assessment_complete||0, saves = tot.save||0;
  const ctr = completes ? Math.round((clicks/completes)*100) : 0;

  const cards = [
    { n: completes,  l: "Assessment completions", pub:false },
    { n: clicks,     l: "Affiliate clicks",       pub:true  },
    { n: ctr + "%",  l: "Clicks per completion",  pub:false },
    { n: saves,      l: "Tools saved",            pub:false }
  ].map(s => `<div class="stat ${s.pub?'pub':''}"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("");

  const top = a.top_clicks || [];
  const max = top.reduce((m,t)=>Math.max(m, t.clicks||0), 0) || 1;
  const topHtml = top.length
    ? top.map((t,i) => {
        const w = Math.round((t.clicks/max)*100);
        return `<div class="barrow">
          <div class="barname">${i+1}. ${esc(t.tool_name||t.tool_id||"—")}</div>
          <div class="bartrack"><div class="barfill" style="width:${w}%"></div></div>
          <div class="barval">${t.clicks}</div></div>`;
      }).join("")
    : `<div class="empty">No clicks yet in this window. Once visitors click “Try”, the tools they pick rank here.</div>`;

  const sv = a.top_saves || [];
  const svHtml = sv.length
    ? `<table><thead><tr><th>Tool</th><th style="text-align:right">Saves</th></tr></thead><tbody>` +
      sv.map(t => `<tr><td class="tname">${esc(t.tool_name||t.tool_id)}</td><td style="text-align:right">${t.saves}</td></tr>`).join("") +
      `</tbody></table>`
    : `<div class="empty">No saves yet in this window.</div>`;

  document.getElementById("anaBody").innerHTML = `
    <div class="stats ana4">${cards}</div>
    <div class="anagrid">
      <div class="anacard"><div class="anah">Top tools by affiliate clicks</div>${topHtml}</div>
      <div class="anacard"><div class="anah">Most-saved tools</div>${svHtml}</div>
    </div>
    <div class="anafoot">First-party, anonymous analytics — no third parties, just counts.
      “Clicks per completion” = affiliate clicks ÷ assessment completions, your core conversion signal.</div>`;
}

/* ===== add a tool ===== */
const DOMAINS = [
  ["sales","Sales & revenue"],["marketing","Marketing & content"],["support","Customer support"],
  ["knowledge","Knowledge mgmt"],["docs","Docs & RFP"],["automation","Workflow automation"],
  ["data","Data & analytics"],["hr","HR & recruiting"],["finance","Finance"],
  ["itdev","IT & dev"],["meetings","Meetings & productivity"]
];
const SIZES = [["small","Small / solo"],["mid","Mid-market"],["large","Enterprise"]];

function buildChips(hostId, items){
  document.getElementById(hostId).innerHTML = items.map(function(it){
    return `<span class="chip" data-v="${it[0]}" onclick="this.classList.toggle('on')">${it[1]}</span>`;
  }).join("");
}
function selectedChips(hostId){
  return Array.from(document.querySelectorAll("#"+hostId+" .chip.on")).map(function(c){ return c.dataset.v; });
}
function openAddForm(){
  buildChips("f_tags", DOMAINS);
  buildChips("f_sizes", SIZES);
  ["f_id","f_name","f_category","f_price","f_desc","f_affiliate","f_commission","f_url","f_site"]
    .forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("f_tier").value="";
  document.getElementById("f_ease").value="";
  document.getElementById("f_status").value="review";
  document.getElementById("f_free").checked=false;
  document.getElementById("addMsg").textContent="";
  document.getElementById("addModal").classList.remove("hide");
  document.getElementById("f_id").focus();
}
function closeAddForm(){ document.getElementById("addModal").classList.add("hide"); }

async function submitAddTool(){
  const msg=document.getElementById("addMsg"); msg.style.color="var(--red)"; msg.textContent="";
  const v = id => document.getElementById(id).value.trim();
  const tool = {
    id: v("f_id").toLowerCase().replace(/[^a-z0-9_-]/g,""),
    name: v("f_name"),
    category: v("f_category"),
    description: v("f_desc"),
    tags: selectedChips("f_tags"),
    sizes: selectedChips("f_sizes"),
    price_tier: document.getElementById("f_tier").value,
    ease: document.getElementById("f_ease").value ? Number(document.getElementById("f_ease").value) : null,
    has_free_plan: document.getElementById("f_free").checked,
    price: v("f_price"),
    affiliate: v("f_affiliate"),
    commission: v("f_commission"),
    url: v("f_url"),
    site: v("f_site"),
    status: document.getElementById("f_status").value
  };
  if(!tool.id || !tool.name){ msg.textContent="ID and Name are required."; return; }
  if(!tool.tags.length){ msg.textContent="Pick at least one use-case tag — otherwise the tool can't match anyone."; return; }
  try{
    await api("add_tool", { tool });
    closeAddForm();
    toast("Added “"+tool.name+"” to "+tool.status);
    setTab(tool.status==="published" ? "published" : "review");
    await load();
  }catch(e){ msg.style.color="var(--red)"; msg.textContent = e.message; }
}

async function act(id, status){
  try{ await api("set_status", { id, status }); toast("Moved to "+status); await load(); }
  catch(e){ toast("Error: "+e.message); }
}
async function del(id, name){
  if(!confirm("Delete \""+name+"\" permanently? This cannot be undone.")) return;
  try{ await api("delete", { id }); toast("Deleted"); await load(); }
  catch(e){ toast("Error: "+e.message); }
}

let toastT;
function toast(m){ const el=document.getElementById("toast"); el.textContent=m; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2200); }

if(PW){ load().then(()=>{ document.getElementById("gate").classList.add("hide"); document.getElementById("dash").classList.remove("hide"); }).catch(()=>{ sessionStorage.removeItem("rs_admin_pw"); PW=""; }); }
